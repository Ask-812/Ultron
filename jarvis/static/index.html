<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRON</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050810;
    color: #c0d0e0;
    font-family: 'Rajdhani', sans-serif;
    height: 100vh;
    overflow: hidden;
    cursor: none;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #scene-container {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
  }

  #scene-container canvas {
    display: block;
  }

  /* ── Input bar (hidden, appears on hover at bottom) ── */
  #input-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    display: flex;
    gap: 10px;
    opacity: 0.7;
    transition: opacity 0.4s;
    pointer-events: auto;
  }
  #input-bar:hover, #input-bar:focus-within {
    opacity: 1;
  }

  #input-field {
    width: 500px;
    padding: 10px 18px;
    background: rgba(5, 15, 35, 0.85);
    border: 1px solid rgba(0, 150, 255, 0.25);
    border-radius: 4px;
    color: #c0d8f0;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    letter-spacing: 0.5px;
    outline: none;
    transition: border-color 0.3s;
  }

  #input-field:focus {
    border-color: rgba(0, 170, 255, 0.6);
    box-shadow: 0 0 20px rgba(0, 150, 255, 0.15);
  }

  #input-field::placeholder {
    color: rgba(100, 150, 200, 0.3);
    letter-spacing: 2px;
  }

  /* ── Mic button ── */
  #mic-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid rgba(0, 150, 255, 0.3);
    background: rgba(5, 15, 35, 0.85);
    color: rgba(0, 170, 255, 0.6);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }

  #mic-btn:hover {
    border-color: rgba(0, 170, 255, 0.6);
    color: rgba(0, 200, 255, 0.9);
    box-shadow: 0 0 15px rgba(0, 150, 255, 0.2);
  }

  #mic-btn.active {
    border-color: rgba(0, 255, 136, 0.5);
    color: rgba(0, 255, 136, 0.8);
    background: rgba(0, 255, 136, 0.1);
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.15);
    animation: micPulse 2s ease-in-out infinite;
  }

  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }
    50% { box-shadow: 0 0 30px rgba(0, 255, 136, 0.3); }
  }

  /* ── Custom cursor ── */
  #cursor {
    position: fixed;
    width: 12px;
    height: 12px;
    border: 1px solid rgba(0, 170, 255, 0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.1s, border-color 0.3s;
    mix-blend-mode: screen;
  }

  /* ── Global scrollbar ── */
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div id="scene-container"></div>

<div id="input-bar">
  <button id="mic-btn" title="Press SPACE or click to activate voice">🎤</button>
  <input type="text" id="input-field" placeholder="speak or type..." autocomplete="off" spellcheck="false">
</div>

<div id="cursor"></div>

<script type="module" src="/static/js/main.js"></script>

<script>
  // Custom cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', (e) => {
    cursor.style.left = (e.clientX - 6) + 'px';
    cursor.style.top = (e.clientY - 6) + 'px';
  });

  // Unlock audio on first interaction (browsers block autoplay)
  let audioUnlocked = false;
  function unlockAudio() {
    if (audioUnlocked) return;
    const ctx = new AudioContext();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    audioUnlocked = true;
    document.removeEventListener('click', unlockAudio);
    document.removeEventListener('keydown', unlockAudio);
  }
  document.addEventListener('click', unlockAudio);
  document.addEventListener('keydown', unlockAudio);
</script>
</body>
</html>
